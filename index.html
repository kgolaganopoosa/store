<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Shakung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" href="/favicon.ico" type="image/x-icon">

  <style>
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        .cart-slide { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-slide.open { transform: translateX(0); }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #lightbox.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
        <button class="absolute top-5 right-5 text-white text-4xl">&times;</button>
    </div>

    <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-purple-700">Shop Shakung</h1>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fa-solid fa-clipboard-list text-3xl text-gray-800 hover:text-purple-700 transition-colors"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-purple-600 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center shadow">0</span>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-10 px-6 text-center">
        <h2 class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight">Stop scrolling, start shopping!</h2>
        <p class="text-lg md:text-xl opacity-90">Fresh picks delivered fast.</p>
        <p class="text-lg md:text-xl opacity-90">Delivery only R3.</p>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="relative flex-grow mb-6">
            <input id="searchInput" type="text" placeholder="Search products..." class="w-full pl-10 pr-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm" oninput="filterProducts()">
            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>

        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="filterCategory('all')" class="category-btn px-5 py-2.5 rounded-full font-medium bg-purple-100 text-purple-800">All</button>
            <button onclick="filterCategory('Bakery')" class="category-btn px-5 py-2.5 rounded-full font-medium bg-purple-100 text-purple-800">Bakery</button>
            <button onclick="filterCategory('Dairy')" class="category-btn px-5 py-2.5 rounded-full font-medium bg-purple-100 text-purple-800">Dairy</button>
        </div>

        <div id="product-container" class="product-grid"></div>
    </div>

    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 overflow-y-auto cart-slide">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Your Shopping List</h2>
                <button onclick="toggleCart()" class="text-gray-500 hover:text-gray-800 text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="mb-8 space-y-4"></div>
            <div class="border-t pt-6">
                <p class="text-sm text-gray-500 mb-4">* Send your list to confirm prices and availability.</p>
                <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-full font-bold text-lg flex items-center justify-center gap-3 active:scale-95 shadow-md">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> Send List to Shop
                </button>
            </div>
        </div>
    </div>

    <footer class="mt-auto bg-gray-900 text-gray-300 py-10 px-6">
        <div class="max-w-6xl mx-auto text-center text-sm">
            © 2026 Shop Shakung. All rights reserved.
        </div>
    </footer>
    
    <script>
        const WHATSAPP_NUMBER = "27646575290"; 

        const products = [
            { id: 1, name: "SASKO Brown Bread", category: "Bakery", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/saskobrownbread.png" },
            { id: 2, name: "SASKO White Bread", category: "Bakery", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/saskowhitebread.png" },
            { id: 3, name: "Albany Superior White", category: "Bakery", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/albanywhite.png" },
            { id: 4, name: "Blue Band Margarine", category: "Dairy", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/blueband.png" }
        ];

        let cart = [];
        let currentCategory = 'all';

        function renderProducts(list = products) {
            const container = document.getElementById('product-container');
            container.innerHTML = list.map(p => `
                <div class="bg-white rounded-3xl p-4 shadow-md border border-gray-100 flex flex-col h-full">
                    <img src="${p.img}" onclick="openLightbox('${p.img}')" class="w-full h-40 object-contain rounded-2xl mb-4 cursor-zoom-in hover:opacity-90 transition bg-gray-50">
                    <p class="text-xs text-purple-600 font-semibold uppercase mb-1">${p.category}</p>
                    <h3 class="font-bold text-base mb-2 flex-grow">${p.name}</h3>
                    
                    <div class="mb-4">
                        <label class="text-xs text-gray-500 block mb-1">Quantity</label>
                        <select id="qty-${p.id}" class="w-full bg-gray-50 border border-gray-200 rounded-lg text-sm p-2 outline-none">
                            ${Array.from({length: 10}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('')}
                        </select>
                    </div>

                    <button onclick="addToCart(${p.id})" class="w-full bg-purple-700 text-white py-3 rounded-xl font-bold hover:bg-purple-800 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus text-xs"></i> Add to List
                    </button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const existing = cart.find(item => item.id === id);
            
            if(existing) {
                existing.qty += qty;
            } else {
                cart.push({ ...product, qty: qty });
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            const itemsContainer = document.getElementById('cart-items');
            itemsContainer.innerHTML = cart.length === 0 ? '<p class="text-center py-8 text-gray-400">Your list is empty</p>' : 
                cart.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div>
                        <p class="font-bold text-gray-800">${item.name}</p>
                        <p class="text-sm text-purple-600 font-medium">Quantity: ${item.qty}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>`).join('');
        }

        function removeFromCart(i) { cart.splice(i, 1); updateUI(); }
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                const isActive = btn.innerText.includes(cat) || (cat === 'all' && btn.innerText === 'All');
                btn.classList.toggle('bg-purple-600', isActive);
                btn.classList.toggle('text-white', isActive);
            });
            filterProducts();
        }

        function filterProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let filtered = products.filter(p => p.name.toLowerCase().includes(q));
            if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
            renderProducts(filtered);
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        function sendToWhatsApp() {
            if (cart.length === 0) return alert("Add items to your list first!");
            let itemsText = cart.map(i => `• ${i.name} (Qty: ${i.qty})`).join('\n');
            const message = `*PETAL CHAIN SHOPPING LIST*\n\n*Items requested:*\n${itemsText}\n\nPlease let me know the prices and if these are in stock!`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        renderProducts();
        updateUI();
    </script>
</body>
</html>
