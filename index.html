<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Shakung</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        
        /* Skeleton Shimmer Animation */
        .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); border-radius: 20px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }

        /* Toast Styles */
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .toast { background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 14px; margin-top: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-green { border-left: 4px solid #22c55e; }

        .cart-slide { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-slide.open { transform: translateX(0); }
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <div id="toast-container"></div>

    <div id="shop-view">
        <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center text-purple-700 overflow-hidden">
                  <img src="navicon.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/40?text=S'">
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-purple-700">Shop Shakung</h1>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">By Petal Chain</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="user-btn" onclick="handleAuthClick()" class="bg-gray-100 px-4 py-1.5 rounded-full border border-gray-200 flex items-center shadow-sm hover:bg-gray-200 transition">
                    <i class="fa-solid fa-circle-user mr-2 text-gray-500"></i>
                    <span id="user-btn-text" class="font-bold text-gray-600 text-sm">Login</span>
                </button>

                <div class="relative cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-clipboard-list text-3xl text-gray-800 hover:text-purple-700 transition-colors"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-purple-600 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center shadow">0</span>
                </div>
            </div>
        </nav>

        <header class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-10 px-6 text-center">
            <h2 id="welcome-msg" class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight">Stop scrolling,</h2>
            <h2 class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight">start shopping!</h2>
        </header>

        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="product-container" class="product-grid">
                <div class="bg-white p-4 rounded-3xl border border-gray-100 h-80">
                    <div class="skeleton w-full h-40 mb-4"></div>
                    <div class="skeleton w-2/3 h-4 mb-2"></div>
                    <div class="skeleton w-1/2 h-6 mb-4"></div>
                    <div class="skeleton w-full h-10 mt-auto"></div>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-gray-100 h-80">
                    <div class="skeleton w-full h-40 mb-4"></div>
                    <div class="skeleton w-2/3 h-4 mb-2"></div>
                    <div class="skeleton w-1/2 h-6 mb-4"></div>
                    <div class="skeleton w-full h-10 mt-auto"></div>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-gray-100 h-80 md:block hidden">
                    <div class="skeleton w-full h-40 mb-4"></div>
                    <div class="skeleton w-2/3 h-4 mb-2"></div>
                    <div class="skeleton w-1/2 h-6 mb-4"></div>
                    <div class="skeleton w-full h-10 mt-auto"></div>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-gray-100 h-80 md:block hidden">
                    <div class="skeleton w-full h-40 mb-4"></div>
                    <div class="skeleton w-2/3 h-4 mb-2"></div>
                    <div class="skeleton w-1/2 h-6 mb-4"></div>
                    <div class="skeleton w-full h-10 mt-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center">
            <h3 class="text-xl font-bold mb-6">Secure Access</h3>
            <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="••••" class="w-32 text-center text-3xl border-b-2 border-purple-500 outline-none mb-8 font-mono">
            <div class="flex gap-3">
                <button onclick="closeLogin()" class="flex-1 py-3 text-gray-500 font-bold">Cancel</button>
                <button onclick="verifyPin()" class="flex-1 py-3 bg-purple-700 text-white rounded-xl font-bold">Unlock</button>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 overflow-y-auto cart-slide">
        <div class="p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Your List</h2>
                <button onclick="toggleCart()" class="text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
            <div class="border-t pt-4">
                <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-full font-bold flex items-center justify-center gap-3">
                    <i class="fa-solid fa-lock text-xs opacity-50"></i>
                    <i class="fa-brands fa-whatsapp text-2xl"></i> Send to WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "27646575290";
        const PRODUCTS = [
            { id: 1, name: "SASKO Brown Bread", category: "Bakery", price: 18.50, img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/saskobrownbread.png" },
            { id: 2, name: "SASKO White Bread", category: "Bakery", price: 17.50, img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/saskowhitebread.png" },
            { id: 4, name: "Ace Maize Meal (2.5kg)", category: "Pantry", price: 34.00, img: "https://pantrymagic.co.za/wp-content/uploads/2021/01/ace-maize-meal-2.5kg.jpg" }
        ];

        let currentUser = null;
        let cart = JSON.parse(localStorage.getItem('shak_cart')) || [];

        // TOAST ENGINE
        function showToast(message, type = "green") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fa-solid fa-circle-check text-green-500"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        // SIMULATED LOADING (Skeleton Test)
        window.addEventListener('load', () => {
            setTimeout(() => {
                renderProducts(PRODUCTS);
            }, 1500); // 1.5s delay to show off the skeletons
        });

        function renderProducts(list) {
            const container = document.getElementById('product-container');
            container.innerHTML = list.map(p => `
                <div class="bg-white rounded-3xl p-4 shadow-md border border-gray-100 flex flex-col h-full animate-in fade-in duration-500">
                    <img src="${p.img}" class="w-full h-32 md:h-40 object-contain rounded-2xl mb-4 bg-gray-50 p-2">
                    <h3 class="font-bold text-xs mb-1 h-8 line-clamp-2">${p.name}</h3>
                    <p class="text-purple-700 font-black text-lg mb-3">R${p.price.toFixed(2)}</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-purple-700 text-white py-3 rounded-2xl font-black text-[10px] uppercase hover:bg-purple-800 transition">Add to List</button>
                </div>`).join('');
        }

        function addToCart(id) {
            const product = PRODUCTS.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if(existing) { existing.qty++; }
            else { cart.push({ ...product, qty: 1 }); }
            
            localStorage.setItem('shak_cart', JSON.stringify(cart));
            updateUI();
            
            // Trigger the New Toast
            showToast(`${product.name} added to list!`);
        }

        // Simplified Helpers
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }
        function openLogin() { document.getElementById('login-modal').classList.replace('hidden', 'flex'); }
        function closeLogin() { document.getElementById('login-modal').classList.replace('flex', 'hidden'); }
        
        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            const itemsContainer = document.getElementById('cart-items');
            itemsContainer.innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl">
                    <img src="${item.img}" class="w-10 h-10 object-contain bg-white rounded-lg">
                    <div class="flex-grow"><p class="font-bold text-[11px]">${item.name}</p></div>
                </div>`).join('');
        }

        function sendToWhatsApp() {
            if (!currentUser) { toggleCart(); openLogin(); return; }
            alert("Order sent!");
        }

        updateUI();
    </script>
</body>
</html>
