<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Shakung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <style>
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        .cart-slide { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-slide.open { transform: translateX(0); }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #lightbox.active { display: flex; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
        <button class="absolute top-5 right-5 text-white text-4xl">&times;</button>
    </div>

    <div id="shop-view">
        <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-purple-700">Shop Shakung</h1>
            
            <div class="flex items-center gap-3">
                <button onclick="openLogin()" class="bg-gray-100 px-4 py-1.5 rounded-full border border-gray-200 flex items-center shadow-sm hover:bg-gray-200 transition">
                    <span class="font-bold text-gray-600 text-sm">Credits</span>
                </button>

                <div class="relative cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-clipboard-list text-3xl text-gray-800 hover:text-purple-700 transition-colors"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-purple-600 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center shadow">0</span>
                </div>
            </div>
        </nav>

        <header class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-10 px-6 text-center">
            <h2 class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight">Stop scrolling, start shopping!</h2>
            <p class="text-lg md:text-xl opacity-90">Fresh picks delivered fast.</p>
            <p class="text-lg md:text-xl opacity-90">Delivery only R3.</p>
        </header>

        <div class="max-w-6xl mx-auto px-4 py-6">
            <div class="relative flex-grow mb-6">
                <input id="searchInput" type="text" placeholder="Search products..." class="w-full pl-10 pr-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm" oninput="filterProducts()">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>

            <div class="flex flex-wrap gap-3 mb-8">
                <button onclick="filterCategory('all')" class="category-btn px-5 py-2.5 rounded-full font-medium bg-purple-100 text-purple-800">All</button>
                <button onclick="filterCategory('Bakery')" class="category-btn px-5 py-2.5 rounded-full font-medium bg-purple-100 text-purple-800">Bakery</button>
                <button onclick="filterCategory('Dairy')" class="category-btn px-5 py-2.5 rounded-full font-medium bg-purple-100 text-purple-800">Dairy</button>
            </div>

            <div id="product-container" class="product-grid"></div>
        </div>
    </div>

    <div id="rewards-view" class="hidden-view min-h-screen bg-white">
        <nav class="p-4 border-b flex items-center gap-4">
            <button onclick="closeRewards()" class="text-gray-600 text-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="view-title" class="text-xl font-bold">My Rewards</h2>
        </nav>
        
        <div class="max-w-2xl mx-auto p-6">
            <div id="card-theme" class="rounded-3xl p-8 text-white mb-8 shadow-xl">
                <p id="account-tier" class="text-sm font-medium uppercase tracking-wider mb-1">Available Balance</p>
                <h3 class="text-5xl font-black mb-4"><span id="display-balance">0.00</span> <span class="text-2xl font-normal">sc</span></h3>
                <div class="flex justify-between items-end">
                    <p id="account-number" class="text-xs opacity-75"></p>
                    <div id="status-tag" class="bg-white/20 px-3 py-1 rounded-lg text-xs">Member</div>
                </div>
            </div>

            <h3 class="font-bold text-lg mb-4">Detailed Statement</h3>
            <div id="statement-list" class="space-y-4">
                </div>
            
            <button onclick="closeRewards()" class="w-full mt-8 py-4 bg-gray-900 text-white rounded-2xl font-bold">Back to Shopping</button>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-lock text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Secure Login</h3>
            <p class="text-gray-500 text-sm mb-6">Enter your 4-digit PIN</p>
            <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="••••" class="w-32 text-center text-3xl tracking-widest border-b-2 border-purple-500 outline-none mb-8 pb-2 font-mono">
            <div class="flex gap-3">
                <button onclick="closeLogin()" class="flex-1 py-3 text-gray-500 font-bold">Cancel</button>
                <button onclick="verifyPin()" class="flex-1 py-3 bg-purple-700 text-white rounded-xl font-bold">Unlock</button>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 overflow-y-auto cart-slide">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Your Shopping List</h2>
                <button onclick="toggleCart()" class="text-gray-500 hover:text-gray-800 text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="mb-8 space-y-4"></div>
            <div class="border-t pt-6">
                <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-full font-bold text-lg flex items-center justify-center gap-3 active:scale-95 shadow-md">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> Send List to Shop
                </button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "27646575290"; 

        // Account Data Object
        const ACCOUNTS = {
            "1234": {
                name: "Petal Chain Rewards",
                balance: "100.00",
                acc: "SHAK-8821-XP",
                tier: "Gold Member",
                theme: "from-purple-700 to-indigo-800",
                history: [
                    { desc: "Weekly Bonus", date: "Mar 08, 2026", amt: "+10.00", color: "text-green-600" },
                    { desc: "Order #9921", date: "Mar 05, 2026", amt: "-25.50", color: "text-red-600" },
                    { desc: "Initial Deposit", date: "Feb 20, 2026", amt: "+115.50", color: "text-green-600" }
                ]
            },
            "0001": {
                name: "Shak Executive",
                balance: "250.00",
                acc: "EXEC-0001-SH",
                tier: "Platinum Plus",
                theme: "from-gray-800 to-black",
                history: [
                    { desc: "Corporate Credit", date: "Mar 09, 2026", amt: "+200.00", color: "text-green-600" },
                    { desc: "Lunch Order", date: "Mar 07, 2026", amt: "-45.00", color: "text-red-600" },
                    { desc: "Opening Balance", date: "Mar 01, 2026", amt: "+95.00", color: "text-green-600" }
                ]
            }
        };

        const products = [
            { id: 1, name: "SASKO Brown Bread", category: "Bakery", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/saskobrownbread.png" },
            { id: 2, name: "SASKO White Bread", category: "Bakery", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/saskowhitebread.png" },
            { id: 3, name: "Parafin", category: "Fluid", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/albanywhite.png" },
            { id: 4, name: "Blue Band Margarine", category: "Dairy", img: "https://raw.githubusercontent.com/kgolaganopoosa/store/refs/heads/main/products/blueband.png" }
        ];

        let cart = [];

        function openLogin() {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('login-modal').classList.add('flex');
            document.getElementById('pin-input').focus();
        }

        function closeLogin() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('flex');
            document.getElementById('pin-input').value = '';
        }

        function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            if(ACCOUNTS[pin]) {
                loadAccount(pin);
                document.getElementById('shop-view').classList.add('hidden-view');
                document.getElementById('rewards-view').classList.remove('hidden-view');
                closeLogin();
                window.scrollTo(0,0);
            } else {
                alert("Access Denied: Invalid PIN");
                document.getElementById('pin-input').value = '';
            }
        }

        function loadAccount(pin) {
            const acc = ACCOUNTS[pin];
            document.getElementById('view-title').innerText = acc.name;
            document.getElementById('display-balance').innerText = acc.balance;
            document.getElementById('account-number').innerText = "Account: " + acc.acc;
            document.getElementById('status-tag').innerText = acc.tier;
            
            // Set Theme
            const card = document.getElementById('card-theme');
            card.className = `bg-gradient-to-br ${acc.theme} rounded-3xl p-8 text-white mb-8 shadow-xl`;

            // Set Statement
            const list = document.getElementById('statement-list');
            list.innerHTML = acc.history.map(item => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <div>
                        <p class="font-bold">${item.desc}</p>
                        <p class="text-xs text-gray-500">${item.date}</p>
                    </div>
                    <p class="${item.color} font-bold">${item.amt}sc</p>
                </div>
            `).join('');
        }

        function closeRewards() {
            document.getElementById('rewards-view').classList.add('hidden-view');
            document.getElementById('shop-view').classList.remove('hidden-view');
        }

        function renderProducts(list = products) {
            const container = document.getElementById('product-container');
            container.innerHTML = list.map(p => `
                <div class="bg-white rounded-3xl p-4 shadow-md border border-gray-100 flex flex-col h-full">
                    <img src="${p.img}" onclick="openLightbox('${p.img}')" class="w-full h-40 object-contain rounded-2xl mb-4 cursor-zoom-in bg-gray-50">
                    <p class="text-xs text-purple-600 font-semibold mb-1">${p.category}</p>
                    <h3 class="font-bold text-base mb-2 flex-grow">${p.name}</h3>
                    <select id="qty-${p.id}" class="w-full bg-gray-50 border rounded-lg text-sm p-2 outline-none mb-3">
                        ${[1,2,3,4,5].map(v => `<option value="${v}">${v}</option>`).join('')}
                    </select>
                    <button onclick="addToCart(${p.id})" class="w-full bg-purple-700 text-white py-3 rounded-xl font-bold hover:bg-purple-800 transition">Add to List</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const existing = cart.find(item => item.id === id);
            if(existing) { existing.qty += qty; } else { cart.push({ ...product, qty: qty }); }
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            const itemsContainer = document.getElementById('cart-items');
            itemsContainer.innerHTML = cart.length === 0 ? '<p class="text-center py-8 text-gray-400">Empty</p>' : 
                cart.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl">
                    <div><p class="font-bold text-gray-800">${item.name}</p><p class="text-sm">Qty: ${item.qty}</p></div>
                    <button onclick="removeFromCart(${index})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');
        }

        function removeFromCart(i) { cart.splice(i, 1); updateUI(); }
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('active'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        
        function sendToWhatsApp() {
            if (cart.length === 0) return alert("Add items first!");
            let itemsText = cart.map(i => `• ${i.name} (Qty: ${i.qty})`).join('\n');
            const message = `*PETAL CHAIN SHOPPING LIST*\n\n${itemsText}`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        renderProducts();
        updateUI();
    </script>
</body>
</html>
